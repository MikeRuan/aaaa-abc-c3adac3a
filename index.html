<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山间漫步 🏔️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: '微软雅黑', sans-serif; }
  #gameContainer { position: relative; width: 480px; height: 520px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
  canvas { position: absolute; top: 0; left: 0; z-index: 1; }
  #ui { position: absolute; bottom: 20px; left: 0; right: 0; z-index: 10; display: flex; justify-content: center; gap: 16px; }
  .action-btn {
    padding: 12px 22px; border: none; border-radius: 50px; font-size: 18px;
    cursor: pointer; font-weight: bold; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none;
  }
  .action-btn:active { transform: scale(0.92); }
  #btnUmbrella { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  #btnGlasses { background: linear-gradient(135deg, #f7971e, #ffd200); color: #333; }
  #btnHat     { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }
  #weatherLabel {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(0,0,0,0.35); color: white;
    padding: 6px 20px; border-radius: 30px; font-size: 15px; font-weight: bold;
  }
  #scoreLabel {
    position: absolute; top: 14px; right: 14px;
    z-index: 10; background: rgba(255,255,255,0.15); color: white;
    padding: 6px 14px; border-radius: 30px; font-size: 14px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas" width="480" height="520"></canvas>
  <div id="weatherLabel">☀️ 阳光普照</div>
  <div id="scoreLabel">分数: 0</div>
  <div id="ui">
    <button class="action-btn" id="btnUmbrella">☂️ 打开雨伞</button>
    <button class="action-btn" id="btnGlasses">😎 戴太阳镜</button>
    <button class="action-btn" id="btnHat">🧢 戴雪帽</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // Game state
  var weather = 'sunny'; // 'sunny' | 'rain' | 'snow'
  var equipped = false;
  var score = 0;
  var weatherTimer = 0;
  var weatherDuration = 300;
  var particles = [];
  var walkFrame = 0;
  var personX = 200, personY = 310;
  var warnTimer = 0; // flashing warning when not equipped

  var weatherLabel = document.getElementById('weatherLabel');
  var scoreLabel = document.getElementById('scoreLabel');
  var btnUmbrella = document.getElementById('btnUmbrella');
  var btnGlasses  = document.getElementById('btnGlasses');
  var btnHat      = document.getElementById('btnHat');

  // Weather configs
  var weathers = ['sunny','rain','snow'];
  var weatherInfo = {
    sunny: { label: '☀️ 阳光普照', sky1: '#87CEEB', sky2: '#ffe066', btn: 'btnGlasses' },
    rain:  { label: '🌧️ 下雨了！', sky1: '#555577', sky2: '#334', btn: 'btnUmbrella' },
    snow:  { label: '❄️ 下雪了！', sky1: '#a8c0d6', sky2: '#e0eaf5', btn: 'btnHat' }
  };

  function setWeather(w) {
    weather = w;
    equipped = false;
    particles = [];
    weatherTimer = 0;
    warnTimer = 0;
    var info = weatherInfo[w];
    weatherLabel.textContent = info.label;
    // Show only relevant button
    btnUmbrella.style.display = 'none';
    btnGlasses.style.display  = 'none';
    btnHat.style.display      = 'none';
    document.getElementById(info.btn).style.display = 'inline-block';
  }

  function nextWeather() {
    var pool = weathers.filter(function(x){ return x !== weather; });
    var next = pool[Math.floor(Math.random() * pool.length)];
    setWeather(next);
  }

  // Spawn particles
  function spawnParticle() {
    if (weather === 'rain') {
      particles.push({ x: Math.random()*W, y: -10, vx: -1, vy: 12, type:'rain' });
    } else if (weather === 'snow') {
      particles.push({ x: Math.random()*W, y: -10, vx: (Math.random()-0.5)*0.8, vy: 1.5+Math.random()*1.5, size: 3+Math.random()*4, type:'snow' });
    }
  }

  // Draw sky gradient
  function drawSky() {
    var info = weatherInfo[weather];
    var grad = ctx.createLinearGradient(0,0,0,H*0.65);
    grad.addColorStop(0, info.sky1);
    grad.addColorStop(1, info.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
  }

  // Draw mountains
  function drawMountains() {
    // Back mountain
    ctx.fillStyle = weather==='snow' ? '#b0c8e0' : '#7a9e7e';
    ctx.beginPath(); ctx.moveTo(0,320); ctx.lineTo(120,160); ctx.lineTo(260,320); ctx.closePath(); ctx.fill();
    ctx.fillStyle = weather==='snow' ? '#cde0f0' : '#8fb89f';
    ctx.beginPath(); ctx.moveTo(180,320); ctx.lineTo(340,130); ctx.lineTo(500,320); ctx.closePath(); ctx.fill();
    // Snow caps
    if (weather==='snow') {
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.moveTo(120,160); ctx.lineTo(100,200); ctx.lineTo(145,200); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(340,130); ctx.lineTo(315,178); ctx.lineTo(368,178); ctx.closePath(); ctx.fill();
    }
    // Ground
    var gGrad = ctx.createLinearGradient(0,320,0,H);
    if (weather==='snow') { gGrad.addColorStop(0,'#dce8f5'); gGrad.addColorStop(1,'#b8cfe8'); }
    else { gGrad.addColorStop(0,'#5a8a3c'); gGrad.addColorStop(1,'#3d6b27'); }
    ctx.fillStyle = gGrad;
    ctx.fillRect(0,320,W,H-320);
    // Path
    ctx.fillStyle = weather==='snow' ? '#eaf2fa' : '#c4a265';
    ctx.beginPath(); ctx.moveTo(100,H); ctx.lineTo(170,320); ctx.lineTo(310,320); ctx.lineTo(380,H); ctx.closePath(); ctx.fill();
  }

  // Draw sun
  function drawSun() {
    if (weather !== 'sunny') return;
    var t = Date.now()/1000;
    ctx.save();
    ctx.translate(400, 70);
    // Rays
    ctx.strokeStyle = 'rgba(255,220,50,0.7)';
    ctx.lineWidth = 3;
    for (var i=0;i<8;i++) {
      var a = (i/8)*Math.PI*2 + t*0.5;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*26, Math.sin(a)*26);
      ctx.lineTo(Math.cos(a)*40, Math.sin(a)*40); ctx.stroke();
    }
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF176';
    ctx.beginPath(); ctx.arc(-5,-5,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Draw clouds
  function drawClouds() {
    var cx = [(Date.now()/60000)%1*600-100, (Date.now()/80000)%1*600+50];
    cx.forEach(function(x,i) {
      ctx.fillStyle = weather==='rain' ? 'rgba(100,100,130,0.85)' : 'rgba(255,255,255,0.85)';
      var y = 60 + i*30;
      ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2);
      ctx.arc(x+30,y-10,22,0,Math.PI*2);
      ctx.arc(x+60,y,26,0,Math.PI*2); ctx.fill();
    });
  }

  // Draw person
  function drawPerson() {
    var x = personX, y = personY;
    var leg = Math.sin(walkFrame*0.12)*10;
    ctx.save(); ctx.translate(x, y);

    // Legs
    ctx.strokeStyle = '#4a3728'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-10+leg, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(10-leg, 30); ctx.stroke();

    // Body
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.roundRect(-14,-50,28,42,6); ctx.fill();

    // Arms
    var arm = Math.sin(walkFrame*0.12)*12;
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-12,-40); ctx.lineTo(-26,-20+arm); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12,-40); ctx.lineTo(26,-20-arm); ctx.stroke();

    // Head
    ctx.fillStyle = '#f5cba7';
    ctx.beginPath(); ctx.arc(0,-60,17,0,Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-6,-60,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-60,2.5,0,Math.PI*2); ctx.fill();
    // Smile
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,-56,5,0.2,Math.PI-0.2); ctx.stroke();

    // ACCESSORIES
    if (weather==='rain' && equipped) {
      // Umbrella
      ctx.fillStyle = '#3498db';
      ctx.beginPath(); ctx.arc(0,-95,28,Math.PI,0); ctx.fill();
      ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0,-95); ctx.lineTo(0,-30); ctx.lineTo(8,-20); ctx.stroke();
      ctx.strokeStyle = '#1a5276'; ctx.lineWidth = 2;
      for(var i=-3;i<=3;i++) {
        ctx.beginPath(); ctx.moveTo(0,-95); ctx.lineTo(i*9.3,-73); ctx.stroke();
      }
    }
    if (weather==='sunny' && equipped) {
      // Sunglasses
      ctx.fillStyle = 'rgba(20,80,200,0.7)';
      ctx.beginPath(); ctx.roundRect(-16,-65,13,9,3); ctx.fill();
      ctx.beginPath(); ctx.roundRect(3,-65,13,9,3); ctx.fill();
      ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-3,-61); ctx.lineTo(3,-61); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-16,-61); ctx.lineTo(-20,-59); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(16,-61); ctx.lineTo(20,-59); ctx.stroke();
    }
    if (weather==='snow' && equipped) {
      // Snow hat
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.roundRect(-18,-82,36,14,4); ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.moveTo(-14,-82); ctx.lineTo(0,-108); ctx.lineTo(14,-82); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(0,-108,5,0,Math.PI*2); ctx.fill();
      // Scarf
      ctx.fillStyle = '#f39c12';
      ctx.beginPath(); ctx.roundRect(-15,-55,30,8,4); ctx.fill();
    }
    ctx.restore();
  }

  // Draw particles
  function drawParticles() {
    particles.forEach(function(p) {
      if (p.type==='rain') {
        ctx.strokeStyle = 'rgba(100,160,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.vx*2, p.y+p.vy*2); ctx.stroke();
      } else {
        ctx.fillStyle = 'rgba(220,240,255,0.9)';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  // Update particles
  function updateParticles() {
    if (Math.random() < 0.35) spawnParticle();
    particles = particles.filter(function(p) {
      p.x += p.vx; p.y += p.vy;
      return p.y < H+10;
    });
  }

  // Draw warning flash
  function drawWarning() {
    if (equipped) return;
    if (weather === 'sunny') return; // sunny is optional feel
    warnTimer++;
    if (Math.floor(warnTimer/18)%2===0) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,50,50,0.18)';
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
    // Score penalty after long time
    if (warnTimer === 200) {
      score = Math.max(0, score-5);
      scoreLabel.textContent = '分数: ' + score;
      warnTimer = 0;
    }
  }

  // Main loop
  function loop() {
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawMountains();
    drawSun();
    drawClouds();
    updateParticles();
    drawParticles();
    drawPerson();
    if (!equipped && weather !== 'sunny') drawWarning();
    walkFrame++;
    weatherTimer++;

    // Give score for being equipped
    if (equipped && weatherTimer % 60 === 0) {
      score++;
      scoreLabel.textContent = '分数: ' + score;
    }
    // Change weather periodically
    if (weatherTimer > weatherDuration) {
      weatherDuration = 240 + Math.floor(Math.random()*200);
      nextWeather();
    }
    requestAnimationFrame(loop);
  }

  // Button handlers
  if (btnUmbrella) btnUmbrella.addEventListener('click', function() {
    if (weather==='rain') { equipped=true; btnUmbrella.style.display='none'; score+=10; scoreLabel.textContent='分数: '+score; }
  });
  if (btnGlasses) btnGlasses.addEventListener('click', function() {
    if (weather==='sunny') { equipped=true; btnGlasses.style.display='none'; score+=10; scoreLabel.textContent='分数: '+score; }
  });
  if (btnHat) btnHat.addEventListener('click', function() {
    if (weather==='snow') { equipped=true; btnHat.style.display='none'; score+=10; scoreLabel.textContent='分数: '+score; }
  });

  // Start
  setWeather('sunny');
  loop();

  // BUTTON CHECKLIST: #btnUmbrella ✓  #btnGlasses ✓  #btnHat ✓
});
</script>
</body>
</html>
